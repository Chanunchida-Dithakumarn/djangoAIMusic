<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Song Configuration</title>
</head>
<body>
    <h2>AI Song Configuration</h2>
    
    <form method="POST" action="{% url 'generate_song' %}">
        
        {% csrf_token %}
        
        <p>
            <label for="title">Song Title:</label><br>
            <input type="text" id="title" name="title" placeholder="e.g. Happy Birthday" required>
        </p>
        
        <p>
            <label for="genre">Music Genre:</label><br>
            <select id="genre" name="genre" required>
                <option value="" disabled selected>-- Select a genre --</option>
                <option value="pop">Pop</option>
                <option value="rock">Rock</option>
                <option value="jazz">Jazz</option>
                <option value="classical">Classical</option>
                <option value="hiphop">Hip Hop</option>
                <option value="rnb">R&B</option>
            </select>
        </p>

        <p>
            <label for="mood">Song Mood:</label><br>
            <select id="mood" name="mood" required>
                <option value="" disabled selected>-- Select a mood --</option>
                <option value="happy">Happy</option>
                <option value="sad">Sad</option>
                <option value="romantic">Romantic</option>
                <option value="relaxed">Relaxed</option>
                <option value="energetic">Energetic</option>
                <option value="calm">Calm</option>
                <option value="angry">Angry</option>
            </select>
        </p>

        <p>
            <label for="visibility">Visibility:</label><br>
            <select id="visibility" name="visibility">
                <option value="private" selected>Private</option>
                <option value="public">Public</option>
            </select>
        </p>
        
        <p>
            <label for="additional">Additional Details:</label><br>
            <textarea id="additional" name="additional" rows="6" cols="50" placeholder="e.g. A song about rainy day with male singer."></textarea>
        </p>
        
        <button type="submit" style="padding: 10px 20px; cursor: pointer;">
            Generate Song
        </button>
        
    </form>

    <br>
    <a href="{% url 'generate_song' %}">Reset Form</a>
</body>
</html>
