<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Song Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .config-card { max-width: 600px; margin: 50px auto; border-radius: 15px; border: none; }
        .btn-generate { background: linear-gradient(45deg, #0d6efd, #6610f2); border: none; padding: 12px; }
        .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <div class="card config-card shadow-lg p-4 p-md-5">
        <h2 class="text-center mb-4 fw-bold text-dark">🎵 AI Song Configuration</h2>
        <p class="text-center text-muted mb-4">Customize your AI-generated music project below.</p>
        
        <form method="POST" action="{% url 'generate_song' %}">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="title" class="form-label fw-semibold">Song Title</label>
                <input type="text" class="form-control form-control-lg" id="title" name="title" 
                       placeholder="e.g. Happy Birthday" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="genre" class="form-label fw-semibold">Music Genre</label>
                    <select class="form-select" id="genre" name="genre" required>
                        <option value="" disabled selected>-- Select genre --</option>
                        <option value="pop">Pop</option>
                        <option value="rock">Rock</option>
                        <option value="jazz">Jazz</option>
                        <option value="classical">Classical</option>
                        <option value="hiphop">Hip Hop</option>
                        <option value="rnb">R&B</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="mood" class="form-label fw-semibold">Song Mood</label>
                    <select class="form-select" id="mood" name="mood" required>
                        <option value="" disabled selected>-- Select mood --</option>
                        <option value="happy">Happy</option>
                        <option value="sad">Sad</option>
                        <option value="romantic">Romantic</option>
                        <option value="relaxed">Relaxed</option>
                        <option value="energetic">Energetic</option>
                        <option value="calm">Calm</option>
                        <option value="angry">Angry</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="visibility" class="form-label fw-semibold">Visibility Settings</label>
                <select class="form-select" id="visibility" name="visibility">
                    <option value="private" selected>🔒 Private</option>
                    <option value="public">🌐 Public</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label for="additional" class="form-label fw-semibold">Additional Details</label>
                <textarea class="form-control" id="additional" name="additional" rows="4" 
                          placeholder="Describe the song style or paste your lyrics here..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary btn-generate w-100 fw-bold fs-5 shadow-sm">
                Generate Song
            </button>
            
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'generate_song' %}" class="text-decoration-none text-muted small">
                ↺ Reset Form
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
